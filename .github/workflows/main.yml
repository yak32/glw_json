name: status

on: [push, pull_request] 

jobs:
  build_on_ubuntu:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: submodules
      run: git submodule update --init
    - name: configure
      run: mkdir build; cd build; cmake -DCMAKE_BUILD_TYPE=Release ..
    - name: build
      run: cd build; cmake --build .
    - name: test
      run: ./tests/tests
  coverage_on_ubuntu:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: submodules
      run: git submodule update --init    
    - name: configure
      run: mkdir build; cd build; cmake -DCMAKE_BUILD_TYPE=COVERAGE ..
    - name: build
      run: cd build; cmake --build . 
    - name: test
      run: ./tests/tests
    - name: install lcov
      run: sudo apt-get install lcov
    - name: generate coverage info
      run: lcov --capture --directory ./  --output-file temp.info --no-external --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch,gcov,source,unused; lcov --remove temp.info '/usr/include/*' '*tests*'  '*gtests*'  -o coverage.info --ignore-errors unused,empty
    - name: coveralls
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.github_token }}
        path-to-lcov: ./coverage.info

  build_on_windows:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v1
    - name: submodules
      run: git submodule update --init
    - name: configure
      run: mkdir build; cd build; cmake -DCMAKE_BUILD_TYPE=Release ..
    - name: build
      run: cd build; cmake --build . --config Release
    - name: test
      run: ./tests/tests.exe
    # - name: benchmark
    #   run: cd install; ./benchmark_test.exe

  build_on_macOS:

    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v1
    - name: submodules
      run: git submodule update --init    
    - name: configure
      run: mkdir build; cd build; cmake -DCMAKE_BUILD_TYPE=Release ..
    - name: build
      run: cd build; cmake --build . 
    - name: test
      run: ./tests/tests
    # - name: benchmark
    #   run: cd install; ./benchmark_test

